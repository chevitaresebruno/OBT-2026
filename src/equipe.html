<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalhe da Equipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0f1a; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .member-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
        }
        .member-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(129, 140, 248, 0.4);
            transform: translateY(-4px);
        }
        .gradient-text {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-nav {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }
        .btn-nav:hover:not(:disabled) {
            background: rgba(129, 140, 248, 0.15);
            border-color: #818cf8;
        }
        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .ods-badge-detail {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.4rem;
            height: 2.4rem;
            border-radius: 50%;
            border: 2px solid rgba(129, 140, 248, 0.4);
            color: #a5b4fc;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.04);
        }
        .ods-badge-detail:hover {
            background: rgba(129, 140, 248, 0.15);
            border-color: #818cf8;
            color: #fff;
            transform: scale(1.05);
        }
        .ods-label {
            color: #a5b4fc;
            font-size: 0.9rem;
        }

        /* ---------- NOVO SLIDER ESTILIZADO ---------- */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.03);
            padding: 0.5rem 1.2rem;
            border-radius: 99px;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(4px);
            transition: border-color 0.3s;
        }
        .slider-container:hover {
            border-color: rgba(129, 140, 248, 0.3);
        }
        .slider-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #c4b5fd;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        /* Custom range input */
        input[type="range"].slider-voto {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 140px;
            height: 6px;
            border-radius: 99px;
            background: linear-gradient(90deg, #4f46e5, #a78bfa, #f472b6);
            outline: none;
            transition: background 0.2s;
        }
        input[type="range"].slider-voto:focus {
            outline: none;
        }
        /* Thumb para WebKit (Chrome, Safari) */
        input[type="range"].slider-voto::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #c084fc, #818cf8);
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 12px rgba(129, 140, 248, 0.6);
            transition: 0.15s ease;
            margin-top: -7px; /* alinha com a track */
        }
        input[type="range"].slider-voto::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.9);
        }
        input[type="range"].slider-voto::-webkit-slider-runnable-track {
            height: 6px;
            border-radius: 99px;
            background: transparent; /* usamos o background no próprio input */
        }
        /* Thumb para Firefox */
        input[type="range"].slider-voto::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #c084fc, #818cf8);
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 12px rgba(129, 140, 248, 0.6);
            cursor: pointer;
        }
        input[type="range"].slider-voto::-moz-range-track {
            height: 6px;
            border-radius: 99px;
            background: linear-gradient(90deg, #4f46e5, #a78bfa, #f472b6);
            border: none;
        }
        /* Estrelas ou nota visual */
        .nota-display {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            min-width: 60px;
        }
        .nota-numero {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f0f0ff;
            width: 2.2rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        .nota-estrelas {
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #fbbf24;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.3);
            transition: 0.2s;
        }
        .nota-estrelas .vazia {
            opacity: 0.25;
        }
        /* Botão de reset (opcional) */
        .btn-reset-nota {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            transition: 0.2s;
            background: rgba(255,255,255,0.04);
            border: 1px solid transparent;
        }
        .btn-reset-nota:hover {
            color: #f1f5f9;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.1);
        }
        /* Responsivo */
        @media (max-width: 640px) {
            .slider-container {
                flex-wrap: wrap;
                justify-content: center;
                padding: 0.5rem 1rem;
                border-radius: 1.5rem;
            }
            input[type="range"].slider-voto {
                width: 100px;
            }
            .nota-display {
                min-width: 50px;
            }
        }
    </style>
</head>
<body class="min-h-screen p-6 flex items-center justify-center">
    <div class="max-w-5xl w-full glass-panel rounded-3xl p-8 md:p-10 shadow-2xl">
        <div id="detalhe-container">
            <div class="text-center text-gray-400 py-10">Carregando...</div>
        </div>

        <!-- Navegação e Slider de Votação -->
        <div class="items-center gap-4 mt-10 pt-6 border-t border-white/10">
            <div class="text-center mb-10">
                <span id="indice-equipe" class="text-sm text-gray-400 font-mono"></span>
            </div>

            <div class="flex gap-3 justify-center">
                <button id="btn-anterior" class="btn-nav px-6 py-2.5 rounded-xl text-white font-medium text-sm">
                    ⬅ Anterior
                </button>

                <div class="slider-container">
                    <span class="slider-label">⭐ Nota</span>
                    <input type="range" class="slider-voto" id="slider-voto" min="1" max="5" step="any" value="1" />
                    <div class="nota-display">
                        <span class="nota-numero" id="valor-nota">1.0</span>
                        <span class="nota-estrelas" id="estrelas-nota">★☆☆☆☆</span>
                        <button class="btn-reset-nota" id="btn-reset-nota" title="Limpar nota">✕</button>
                    </div>
                </div>

                <button id="btn-proximo" class="btn-nav px-6 py-2.5 rounded-xl text-white font-medium text-sm">
                    Próximo ➡
                </button>
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-indigo-300 hover:text-indigo-200 text-sm font-medium underline underline-offset-2 transition">
                ← Voltar para a lista
            </a>
        </div>
    </div>

    <script type="module">
        import {fetch_data_json} from "./fetch_data.js";

        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let index = parseInt(urlParams.get('index'), 10);
            if (isNaN(index) || index < 0) index = 0;

            const container = document.getElementById('detalhe-container');
            const btnAnterior = document.getElementById('btn-anterior');
            const btnProximo = document.getElementById('btn-proximo');
            const indiceSpan = document.getElementById('indice-equipe');
            const slider = document.getElementById('slider-voto');
            const valorSpan = document.getElementById('valor-nota');
            const estrelasSpan = document.getElementById('estrelas-nota');
            const btnReset = document.getElementById('btn-reset-nota');

            // Mapeamento dos ODS (nomes oficiais em português)
            const odsNomes = {
                1: "Erradicação da pobreza",
                2: "Fome zero e agricultura sustentável",
                3: "Saúde e bem-estar",
                4: "Educação de qualidade",
                5: "Igualdade de gênero",
                6: "Água potável e saneamento",
                7: "Energia limpa e acessível",
                8: "Trabalho decente e crescimento econômico",
                9: "Indústria, inovação e infraestrutura",
                10: "Redução das desigualdades",
                11: "Cidades e comunidades sustentáveis",
                12: "Consumo e produção responsáveis",
                13: "Ação contra a mudança global do clima",
                14: "Vida na água",
                15: "Vida terrestre",
                16: "Paz, justiça e instituições eficazes",
                17: "Parcerias e meios de implementação"
            };

            const odsMap = {
                1: { emoji: '🛑', cor: '#e5243b', nome: 'Erradicação da pobreza' },
                2: { emoji: '🌾', cor: '#dda63a', nome: 'Fome zero' },
                3: { emoji: '🏥', cor: '#4c9f38', nome: 'Saúde e bem-estar' },
                4: { emoji: '📚', cor: '#c5192d', nome: 'Educação de qualidade' },
                5: { emoji: '⚧️', cor: '#ff3a21', nome: 'Igualdade de gênero' },
                6: { emoji: '💧', cor: '#26bde2', nome: 'Água potável e saneamento' },
                7: { emoji: '⚡', cor: '#fcc30b', nome: 'Energia limpa e acessível' },
                8: { emoji: '💼', cor: '#a21942', nome: 'Trabalho decente e crescimento econômico' },
                9: { emoji: '🔬', cor: '#fd6925', nome: 'Inovação e infraestrutura' },
                10: { emoji: '⚖️', cor: '#dd1367', nome: 'Redução das desigualdades' },
                11: { emoji: '🏙️', cor: '#fd9d24', nome: 'Cidades e comunidades sustentáveis' },
                12: { emoji: '♻️', cor: '#bf8b2e', nome: 'Consumo e produção responsáveis' },
                13: { emoji: '🌍', cor: '#3f7e44', nome: 'Ação contra a mudança global do clima' },
                14: { emoji: '🐠', cor: '#0a97d9', nome: 'Vida na água' },
                15: { emoji: '🌳', cor: '#56c02b', nome: 'Vida terrestre' },
                16: { emoji: '🕊️', cor: '#00689d', nome: 'Paz, justiça e instituições eficazes' },
                17: { emoji: '🤝', cor: '#19486a', nome: 'Parcerias e meios de implementação' }
            };

            let equipes = [];

            function renderODS(odsArray) {
                if (!odsArray || odsArray.length === 0) return '';
                return odsArray.map(num => {
                    const info = odsMap[num];
                    if (!info) return '';
                    return `<span class="ods-badge" style="background-color: ${info.cor}33; border-color: ${info.cor}; color: ${info.cor}; cursor: pointer;" title="${info.nome}" onclick="window.open('https://brasil.un.org/pt-br/sdgs/${num}', '_blank')">
                        ${info.emoji} ${num} - ${info.nome}
                    </span>`;
                }).join('');
            }

            // ----- LÓGICA DO SLIDER E LOCALSTORAGE -----
            const STORAGE_KEY = 'votos_equipes';

            function carregarVotos() {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    return data ? JSON.parse(data) : [];
                } catch {
                    return [];
                }
            }

            function salvarVotos(votos) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(votos));
            }

            function obterNotaDoIndex(idx) {
                const votos = carregarVotos();
                const voto = votos.find(v => v.index === idx);
                return voto ? voto.nota : null;
            }

            // Função para atualizar a exibição das estrelas
            function atualizarEstrelas(nota) {
                if (nota === null || nota === undefined) nota = 1; // fallback
                const estrelasCheias = Math.floor(nota);
                const fracao = nota - estrelasCheias;
                // Construir string com estrelas cheias, meia estrela e vazias
                let estrelas = '';
                for (let i = 0; i < 5; i++) {
                    if (i < estrelasCheias) {
                        estrelas += '★';
                    } else if (i === estrelasCheias && fracao >= 0.5) {
                        estrelas += '★'; // ou meia estrela, mas usaremos cheia para simplificar
                    } else {
                        estrelas += '☆';
                    }
                }
                // Ajustar para mostrar meia estrela se for o caso (usando símbolo especial)
                // Vamos usar uma representação mais simples: se nota >= 0.5 a mais que o inteiro, mostramos meia estrela com um símbolo
                if (fracao >= 0.25 && fracao < 0.75) {
                    // substituir a estrela vazia ou cheia por meia
                    // Para simplificar, usamos ★ e ☆ apenas, mas podemos usar um Unicode de meia estrela: ½
                    // Ou podemos manter apenas cheio/vazio e arredondar para o inteiro mais próximo.
                    // Vou optar por mostrar estrelas cheias até o valor inteiro e depois uma estrela parcial.
                    let estrelasMeia = '';
                    for (let i = 0; i < 5; i++) {
                        if (i < Math.floor(nota)) {
                            estrelasMeia += '★';
                        } else if (i === Math.floor(nota) && (nota - Math.floor(nota)) >= 0.5) {
                            estrelasMeia += '★'; // usei cheia, mas poderia ser um símbolo de meia
                        } else {
                            estrelasMeia += '☆';
                        }
                    }
                    estrelas = estrelasMeia;
                }
                // Para notas com .5 exato, mostrar meia estrela (usando símbolo)
                if (Number.isInteger(nota * 2) && (nota * 2) % 2 !== 0) {
                    // nota é .5
                    let estrelasMeia = '';
                    for (let i = 0; i < 5; i++) {
                        if (i < Math.floor(nota)) {
                            estrelasMeia += '★';
                        } else if (i === Math.floor(nota)) {
                            estrelasMeia += '★'; // poderia ser ½, mas vou usar ★ para manter
                        } else {
                            estrelasMeia += '☆';
                        }
                    }
                    estrelas = estrelasMeia;
                }
                estrelasSpan.textContent = estrelas;
            }

            function atualizarSlider() {
                const nota = obterNotaDoIndex(index);
                if (nota !== null) {
                    slider.value = nota;
                    valorSpan.textContent = nota.toFixed(1);
                    atualizarEstrelas(nota);
                } else {
                    slider.value = 1;
                    valorSpan.textContent = '1.0';
                    atualizarEstrelas(1);
                }
            }

            function salvarNota(idx, nota) {
                let votos = carregarVotos();
                const existente = votos.find(v => v.index === idx);
                if (existente) {
                    existente.nota = nota;
                } else {
                    votos.push({ index: idx, nota: nota });
                }
                salvarVotos(votos);
            }

            // Eventos do slider
            slider.addEventListener('input', function() {
                const val = parseFloat(this.value);
                valorSpan.textContent = val.toFixed(1);
                atualizarEstrelas(val);
            });

            slider.addEventListener('change', function() {
                const val = parseFloat(this.value);
                salvarNota(index, val);
            });

            // Resetar nota (remove do localStorage para este índice)
            btnReset.addEventListener('click', function() {
                let votos = carregarVotos();
                votos = votos.filter(v => v.index !== index);
                salvarVotos(votos);
                // Atualiza slider para valor padrão 1
                slider.value = 1;
                valorSpan.textContent = '1.0';
                atualizarEstrelas(1);
                // feedback opcional
            });

            // ----- FIM LÓGICA SLIDER -----

            function normalizarUrl(url) {
                if (!url) return '';
                const valor = String(url).trim();
                if (/^(https?:|mailto:|tel:|#|\/|\.{1,2}\/)/i.test(valor)) return valor;
                if (/^(assets\/|data\.json)/i.test(valor)) return valor;
                return `https://${valor}`;
            }

            function renderEquipe(pos) {
                if (!equipes.length || pos < 0 || pos >= equipes.length) {
                    container.innerHTML = '<div class="text-center text-red-400">Equipe não encontrada.</div>';
                    btnAnterior.disabled = true;
                    btnProximo.disabled = true;
                    indiceSpan.textContent = '';
                    return;
                }

                const eq = equipes[pos];
                let membrosHTML = '';
                if (eq.membros_equipe && eq.membros_equipe.length) {
                    membrosHTML = `
                        <div class="mt-10">
                            <h3 class="text-xl font-semibold text-white/80 text-center mb-6">Equipe ${eq.nome_equipe}</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                ${eq.membros_equipe.map(m => `
                                    <div class="member-card rounded-xl p-4 text-center">
                                        <img src="${m.imagem}" alt="${m.nome}" class="w-16 h-16 rounded-full mx-auto border-2 border-indigo-400/30 object-cover" />
                                        <p class="text-white font-medium mt-2 text-sm">${m.nome}</p>
                                        <p class="text-indigo-300 text-xs uppercase tracking-wider">${m.funcao}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                let odsHTML = '';
                if (eq.ods && eq.ods.length) {
                    const badges = eq.ods.map(num => `
                        <span class="ods-badge-detail" title="${odsNomes[num] || 'ODS ' + num}">
                            ${num}
                        </span>
                    `).join(' ');
                    odsHTML = `
                        <div class="mt-6">
                            <h4 class="text-sm font-semibold text-indigo-300/80 uppercase tracking-wider">Objetivos de Desenvolvimento Sustentável</h4>
                            <div class="flex flex-wrap justify-center gap-2 mt-3">
                                ${badges}
                            </div>
                            <div class="mt-2 text-xs text-gray-400 max-w-xl mx-auto">
                                ${eq.ods.map(num => `<span class="ods-label">ODS ${num}: ${odsNomes[num] || ''}</span>`).join(' · ')}
                            </div>
                        </div>
                    `;
                }

                const odsHtml = renderODS(eq.ods || []);
                const botoesLinksHTML = `
                    ${eq.url_prototipo ? `
                        <a href="${normalizarUrl(eq.url_prototipo)}" target="_blank" rel="noopener noreferrer"
                        class="inline-block mr-2 mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-8 py-3 rounded-xl transition shadow-lg">
                            Acessar Protótipo
                        </a>
                    ` : ''}
                    ${eq.url_app ? `
                        <a href="${normalizarUrl(eq.url_app)}" target="_blank" rel="noopener noreferrer"
                        class="inline-block mr-2 mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-8 py-3 rounded-xl transition shadow-lg">
                            Acessar App
                        </a>
                    ` : ''}
                    ${eq.url_banner ? `
                        <a href="${normalizarUrl(eq.url_banner)}" target="_blank" rel="noopener noreferrer"
                        class="inline-block mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-8 py-3 rounded-xl transition shadow-lg">
                            Acessar Banner
                        </a>
                    ` : ''}
                `;

                container.innerHTML = `
                    <div class="text-center">
                        <img src="${eq.url_imagem_logo}" alt="${eq.nome_app}" 
                            class="w-36 h-36 object-cover mx-auto rounded-full border-2 border-indigo-400/40 shadow-xl" />
                        <h1 class="text-3xl md:text-4xl font-extrabold text-white mt-4">${eq.nome_app}</h1>
                        <p class="text-gray-300 mt-3 text-base md:text-lg max-w-2xl mx-auto">${eq.descricao}</p>
                        
                        <div class="flex flex-wrap justify-center gap-2 mt-4">
                            ${odsHtml}
                        </div>
                        
                        <div class="mt-6 rounded-xl overflow-hidden shadow-2xl border border-white/10">
                            <iframe class="w-full aspect-video" src="${eq.url_youtube}" 
                                    frameborder="0" allowfullscreen 
                                    title="Vídeo da equipe ${eq.nome_app}"></iframe>
                        </div>
                        ${botoesLinksHTML}
                        ${membrosHTML}
                    </div>
                `;

                btnAnterior.disabled = (pos === 0);
                if(pos === equipes.length - 1) {
                    btnProximo.innerText = "🗳️ Votar";
                    btnProximo.onclick = function(){window.location.href="./ranking.html"};
                }
                indiceSpan.textContent = `${pos + 1} / ${equipes.length}`;

                // Atualiza o slider com a nota salva
                atualizarSlider();
            }

            function obterDadosEquipes() {
                const dadosLocais = Array.isArray(window.EQUIPES_DATA) ? window.EQUIPES_DATA : null;

                if (window.location.protocol === 'file:' && dadosLocais) {
                    return Promise.resolve(dadosLocais);
                }

                return fetch_data_json()
                    .catch(err => {
                        if (dadosLocais) {
                            console.warn('Usando dados locais de data.js como fallback.', err);
                            return dadosLocais;
                        }
                        throw err;
                    });
            }

            function carregarDados() {
                obterDadosEquipes()
                    .then(data => {
                        equipes = data;
                        if (index >= equipes.length) index = equipes.length - 1;
                        if (index < 0) index = 0;
                        renderEquipe(index);
                    })
                    .catch(err => {
                        container.innerHTML = `<div class="text-center text-red-400">Erro ao carregar dados: ${err.message}</div>`;
                        console.error(err);
                    });
            }

            btnAnterior.addEventListener('click', () => {
                if (index > 0) {
                    index--;
                    window.location.href = `?index=${index}`;
                }
            });

            btnProximo.addEventListener('click', () => {
                if (index < equipes.length - 1) {
                    index++;
                    window.location.href = `?index=${index}`;
                }
            });

            carregarDados();
        })();
    </script>
</body>
</html>

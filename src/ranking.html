<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Votação por Pontuação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0f1a;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .team-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
        }

        .team-card:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .podium-1 {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            border-color: #ffd700;
            border-width: 2px;
        }

        .podium-2 {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.15), rgba(192, 192, 192, 0.05));
            border-color: #c0c0c0;
            border-width: 2px;
        }

        .podium-3 {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.15), rgba(205, 127, 50, 0.05));
            border-color: #cd7f32;
            border-width: 2px;
        }

        .rank-position {
            width: 2.75rem;
            height: 2.75rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: rgba(129, 140, 248, 0.14);
            border: 1px solid rgba(129, 140, 248, 0.28);
            color: #c4b5fd;
            font-weight: 800;
            flex: 0 0 auto;
        }

        .nota-input {
            width: 7.5rem;
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(129, 140, 248, 0.35);
            border-radius: 0.85rem;
            color: #fff;
            font-weight: 800;
            padding: 0.7rem 0.9rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .nota-input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
            background: rgba(15, 23, 42, 1);
        }

        .nota-input:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .btn-votar {
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            transition: all 0.2s;
        }

        .btn-votar:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 8px 25px -6px rgba(129, 140, 248, 0.5);
        }

        .btn-votar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #ranking-list {
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body class="min-h-screen p-6 flex items-center justify-center">
    <div class="max-w-5xl w-full glass-panel rounded-3xl p-8 md:p-10 shadow-2xl">
        <h1 class="text-3xl md:text-4xl font-extrabold text-white text-center mb-2">
            Classificação Final
        </h1>
        <p class="text-gray-400 text-center text-sm mb-8">
            Atribua notas de 1 a 5. A lista será ordenada pela maior pontuação.
        </p>

        <div id="ranking-container">
            <div class="text-center text-gray-400 py-10">Carregando...</div>
        </div>

        <div class="mt-10 text-center">
            <button id="btn-votar" class="btn-votar px-10 py-3 rounded-xl text-white font-bold text-base tracking-wider shadow-lg">
                Votar
            </button>
            <p class="text-gray-500 text-xs mt-3">Ao votar, você será direcionado para o formulário com as pontuações preenchidas.</p>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-indigo-300 hover:text-indigo-200 text-sm font-medium underline underline-offset-2 transition">
                ← Voltar para a lista
            </a>
        </div>
    </div>

    <script src="data.js"></script>
    <script type="module">
        import { vote } from "./VoteHandler.js";

        (function() {
            const container = document.getElementById('ranking-container');
            const btnVotar = document.getElementById('btn-votar');

            const STORAGE_VOTOS = 'votos_equipes';
            const STORAGE_FINALIZADO = 'votacao_finalizada_notas';

            let equipes = [];
            let votos = [];
            let ranking = [];
            let finalizado = false;

            function obterDadosEquipes() {
                const dadosLocais = Array.isArray(window.EQUIPES_DATA) ? window.EQUIPES_DATA : null;

                if (window.location.protocol === 'file:' && dadosLocais) {
                    return Promise.resolve(dadosLocais);
                }

                return fetch('data.json')
                    .then(res => {
                        if (!res.ok) throw new Error('Erro ao carregar data.json');
                        return res.json();
                    })
                    .catch(err => {
                        if (dadosLocais) {
                            console.warn('Usando dados locais de data.js como fallback.', err);
                            return dadosLocais;
                        }
                        throw err;
                    });
            }

            function normalizarNota(valor, fallback = 1) {
                const numero = Number(String(valor ?? '').trim().replace(',', '.'));
                if (!Number.isFinite(numero)) return fallback;
                if (numero < 1) return 1;
                if (numero > 5) return 5;
                return numero;
            }

            function formatarNota(valor) {
                return String(normalizarNota(valor));
            }

            function escaparHtml(valor) {
                return String(valor ?? '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function carregarVotos() {
                try {
                    const raw = localStorage.getItem(STORAGE_VOTOS);
                    votos = raw ? JSON.parse(raw) : [];
                    if (!Array.isArray(votos)) votos = [];
                } catch {
                    votos = [];
                }
            }

            function salvarVotos() {
                localStorage.setItem(STORAGE_VOTOS, JSON.stringify(votos));
            }

            function obterNotaInicial(equipe, index) {
                const votoSalvo = votos.find(v => v.index === index || v.id === equipe.id);
                if (votoSalvo) return normalizarNota(votoSalvo.nota);

                if (typeof vote !== 'undefined' && typeof vote.get_value === 'function') {
                    const notaDoHandler = vote.get_value(equipe.id);
                    if (notaDoHandler !== '' && notaDoHandler !== undefined && notaDoHandler !== null) {
                        return normalizarNota(notaDoHandler);
                    }
                }

                return 1;
            }

            function construirRanking() {
                ranking = equipes.map((eq, index) => ({
                    id: eq.id,
                    index,
                    nome: eq.nome_equipe,
                    nota: obterNotaInicial(eq, index)
                }));
                ordenarRanking();
            }

            function ordenarRanking() {
                ranking.sort((a, b) => {
                    if (b.nota !== a.nota) return b.nota - a.nota;
                    return a.index - b.index;
                });
            }

            function salvarNotaDaEquipe(item) {
                const existente = votos.find(v => v.index === item.index || v.id === item.id);
                if (existente) {
                    existente.index = item.index;
                    existente.id = item.id;
                    existente.nota = item.nota;
                } else {
                    votos.push({ index: item.index, id: item.id, nota: item.nota });
                }
                salvarVotos();
            }

            function atualizarNota(equipeId, valor) {
                if (finalizado) return;

                const item = ranking.find(eq => eq.id === equipeId);
                if (!item) return;

                item.nota = normalizarNota(valor, item.nota);
                salvarNotaDaEquipe(item);
                ordenarRanking();
                renderizar(equipeId);
            }

            function sincronizarInputsAtuais() {
                document.querySelectorAll('.nota-input').forEach(input => {
                    const item = ranking.find(eq => eq.id === input.dataset.id);
                    if (!item) return;
                    item.nota = normalizarNota(input.value, item.nota);
                    salvarNotaDaEquipe(item);
                });
                ordenarRanking();
            }

            function enviarPontuacoesParaVoteHandler() {
                if (typeof vote === 'undefined' ||
                    typeof vote.set_value !== 'function' ||
                    typeof vote.get_url !== 'function') {
                    throw new Error('VoteHandler não encontrado ou métodos ausentes.');
                }

                ranking.forEach(equipe => {
                    vote.set_value(equipe.id, String(equipe.nota));
                });

                const url = vote.get_url();
                if (!url) throw new Error('A URL retornada está vazia.');
                return url;
            }

            function finalizarVotacao() {
                if (finalizado) {
                    alert('Votação já finalizada!');
                    return;
                }

                sincronizarInputsAtuais();

                if (!confirm('Você será redirecionado para a página do Google Forms.')) {
                    renderizar();
                    return;
                }

                try {
                    const url = enviarPontuacoesParaVoteHandler();
                    window.open(url, '_blank');
                    localStorage.setItem(STORAGE_FINALIZADO, 'true');
                    finalizado = true;
                    renderizar();
                    alert('Votação finalizada com sucesso! Obrigado por participar.');
                } catch (err) {
                    alert(err.message);
                    console.error(err);
                }
            }

            function classePodium(posicao) {
                if (posicao === 1) return 'podium-1';
                if (posicao === 2) return 'podium-2';
                if (posicao === 3) return 'podium-3';
                return '';
            }

            function renderizar(focoId = null) {
                if (!ranking.length) {
                    container.innerHTML = '<div class="text-center text-gray-400">Nenhuma equipe encontrada.</div>';
                    return;
                }

                let html = '<ul id="ranking-list" class="space-y-3">';
                ranking.forEach((equipe, index) => {
                    const posicao = index + 1;
                    html += `
                        <li class="team-card rounded-xl p-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between ${classePodium(posicao)}">
                            <div class="flex items-center gap-3 min-w-0">
                                <span class="rank-position">${posicao}</span>
                                <div class="min-w-0">
                                    <div class="text-white font-semibold truncate">${escaparHtml(equipe.nome)}</div>
                                    <div class="text-xs text-gray-500 font-mono">${escaparHtml(equipe.id)}</div>
                                </div>
                            </div>
                            <label class="flex items-center gap-3 justify-between md:justify-end">
                                <span class="text-sm text-gray-400">Nota</span>
                                <input
                                    class="nota-input"
                                    type="text"
                                    inputmode="decimal"
                                    autocomplete="off"
                                    data-id="${escaparHtml(equipe.id)}"
                                    value="${escaparHtml(formatarNota(equipe.nota))}"
                                    ${finalizado ? 'disabled' : ''}
                                    aria-label="Nota da equipe ${escaparHtml(equipe.nome)}"
                                />
                            </label>
                        </li>
                    `;
                });
                html += '</ul>';
                container.innerHTML = html;

                if (finalizado) {
                    btnVotar.textContent = 'Votação finalizada';
                    btnVotar.disabled = true;
                } else {
                    btnVotar.textContent = 'Votar';
                    btnVotar.disabled = false;
                }

                if (focoId) {
                    const input = container.querySelector(`.nota-input[data-id="${CSS.escape(focoId)}"]`);
                    if (input) {
                        input.focus();
                        input.select();
                    }
                }
            }

            container.addEventListener('change', (event) => {
                const input = event.target.closest('.nota-input');
                if (!input) return;
                atualizarNota(input.dataset.id, input.value);
            });

            container.addEventListener('keydown', (event) => {
                const input = event.target.closest('.nota-input');
                if (!input) return;
                if (event.key === 'Enter') {
                    event.preventDefault();
                    input.blur();
                }
            });

            btnVotar.addEventListener('click', finalizarVotacao);

            obterDadosEquipes()
                .then(data => {
                    equipes = data;
                    carregarVotos();
                    construirRanking();
                    finalizado = localStorage.getItem(STORAGE_FINALIZADO) === 'true';
                    renderizar();
                })
                .catch(err => {
                    container.innerHTML = `<div class="text-center text-red-400">Erro: ${escaparHtml(err.message)}</div>`;
                    console.error(err);
                });
        })();
    </script>
</body>
</html>
